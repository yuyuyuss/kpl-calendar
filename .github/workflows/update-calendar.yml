name: 更新KPL赛程日历

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-calendar:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 获取完整的提交历史，方便 rebase

      - name: 设置Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 运行脚本生成日历
        run: python generate_calendar.py

      - name: 提交并推送更改
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add kpl.ics schedule.json
          git diff --staged --quiet || git commit -m "🤖 自动更新赛程 $(date +'%Y-%m-%d %H:%M')"
          # 关键：先拉取远程更新，再推送
          git pull origin main --rebase
          git push origin main