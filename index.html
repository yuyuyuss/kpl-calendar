<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KPL赛程日历</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            max-width: 900px;
            margin: 30px auto;
            padding: 20px;
            background: #f5f7fa;
            color: #1a1a2e;
        }

        h1 {
            color: #1a1a2e;
            border-left: 5px solid #e74c3c;
            padding-left: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            margin: 20px 0;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
        }

        .btn {
            display: inline-block;
            background: #2d3436;
            color: white;
            padding: 12px 32px;
            border-radius: 8px;
            border: none;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn:hover {
            background: #1a1a2e;
            transform: translateY(-1px);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-primary {
            background: #0984e3;
        }

        .btn-primary:hover {
            background: #0069d9;
        }

        .btn-success {
            background: #00b894;
        }

        .btn-success:hover {
            background: #00a381;
        }

        .btn-danger {
            background: #e74c3c;
        }

        .btn-danger:hover {
            background: #c0392b;
        }

        #status {
            margin-top: 15px;
            padding: 12px 16px;
            border-radius: 8px;
            display: none;
            font-weight: 500;
        }

        #status.loading {
            display: block;
            background: #dfe6e9;
            color: #2d3436;
        }

        #status.success {
            display: block;
            background: #d4edda;
            color: #155724;
        }

        #status.error {
            display: block;
            background: #f8d7da;
            color: #721c24;
        }

        .schedule-list {
            margin-top: 15px;
        }

        .schedule-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            border-bottom: 1px solid #eee;
            flex-wrap: wrap;
            gap: 8px;
        }

        .schedule-item:last-child {
            border-bottom: none;
        }

        .schedule-time {
            font-weight: 600;
            color: #0984e3;
            min-width: 110px;
        }

        .schedule-teams {
            font-weight: 500;
            flex: 1;
            min-width: 150px;
        }

        .schedule-teams .vs {
            color: #e74c3c;
            font-weight: 700;
            margin: 0 6px;
        }

        .schedule-meta {
            color: #888;
            font-size: 14px;
        }

        .subscribe-box {
            background: #f1f2f6;
            padding: 12px 16px;
            border-radius: 8px;
            word-break: break-all;
            font-family: monospace;
            font-size: 14px;
            margin: 10px 0;
        }

        .last-update {
            color: #888;
            font-size: 14px;
            margin-top: 10px;
        }

        .empty-state {
            text-align: center;
            color: #888;
            padding: 40px 0;
        }

        @media (max-width: 600px) {
            .schedule-item {
                flex-direction: column;
                align-items: stretch;
                text-align: center;
            }
        }
    </style>
</head>

<body>

    <h1>📅 KPL 赛程</h1>

    <!-- 控制区 -->
    <div class="card">
        <div style="display: flex; gap: 12px; flex-wrap: wrap; align-items: center;">
            <button class="btn btn-success" id="updateBtn" onclick="triggerUpdate()">
                🔄 更新赛程
            </button>
            <span style="color: #888; font-size: 14px;" id="lastUpdateText">上次更新：加载中...</span>
        </div>
        <div id="status"></div>
    </div>

    <!-- 赛程列表 -->
    <div class="card">
        <h2 style="margin-top: 0;">📋 赛程列表</h2>
        <div id="scheduleContainer">
            <div class="empty-state">⏳ 加载赛程中...</div>
        </div>
    </div>

    <!-- 订阅信息 -->
    <div class="card">
        <h2 style="margin-top: 0;">📌 日历订阅</h2>
        <p>复制下方链接，在日历App中添加订阅：</p>
        <div class="subscribe-box" id="subscribeUrl">加载中...</div>
        <button class="btn btn-primary" onclick="copyUrl()">📋 复制订阅链接</button>
    </div>

    <script>
        // ===== 配置区 =====
        const GITHUB_USERNAME = 'yuyuyuss';
        const GITHUB_REPO = 'kpl-calendar';
        const WORKFLOW_FILE = 'update-calendar.yml';
        const API_URL = `https://api.github.com/repos/${GITHUB_USERNAME}/${GITHUB_REPO}/actions/workflows/${WORKFLOW_FILE}/dispatches`;

        // ===== 核心逻辑 =====

        // 触发 Actions 运行
        async function triggerUpdate() {
            const btn = document.getElementById('updateBtn');
            const status = document.getElementById('status');

            btn.disabled = true;
            btn.textContent = '⏳ 更新中...';
            status.className = 'loading';
            status.textContent = '⏳ 正在触发更新，请稍候...';
            status.style.display = 'block';

            try {
                // 注意：这里不需要 Token！因为公开仓库的 workflow_dispatch 可以通过 API 触发
                // 但 GitHub 要求必须带 Accept 头
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Accept': 'application/vnd.github.v3+json'
                    },
                    body: JSON.stringify({ ref: 'main' })
                });

                if (response.ok) {
                    status.className = 'success';
                    status.textContent = '✅ 更新已触发！等待约30秒后，点击"刷新赛程"查看最新数据。';

                    // 自动轮询检测更新
                    await waitForUpdate();
                } else {
                    const errorData = await response.json();
                    status.className = 'error';
                    status.textContent = `❌ 触发失败 (${response.status}): ${errorData.message || '未知错误'}`;
                }
            } catch (error) {
                status.className = 'error';
                status.textContent = `❌ 网络错误: ${error.message}`;
            } finally {
                btn.disabled = false;
                btn.textContent = '🔄 更新赛程';
            }
        }

        // 等待更新完成（轮询检测 schedule.json 的更新时间）
        async function waitForUpdate() {
            const status = document.getElementById('status');
            let attempts = 0;
            const maxAttempts = 30; // 最多等 30 秒

            while (attempts < maxAttempts) {
                await new Promise(resolve => setTimeout(resolve, 1000));
                attempts++;

                // 检测 schedule.json 是否有更新
                try {
                    const url = `https://raw.githubusercontent.com/${GITHUB_USERNAME}/${GITHUB_REPO}/main/schedule.json?t=${Date.now()}`;
                    const response = await fetch(url, { cache: 'no-store' });
                    if (response.ok) {
                        // 如果能获取到数据，说明文件已更新
                        status.textContent = '✅ 赛程已更新！正在加载...';
                        await loadSchedule();
                        status.className = 'success';
                        status.textContent = '✅ 赛程更新完成！';
                        return;
                    }
                } catch (e) {
                    // 继续等待
                }
            }
            status.className = 'success';
            status.textContent = '✅ 更新已触发，请稍后手动刷新页面查看。';
        }

        // 加载并显示赛程
        async function loadSchedule(force = false) {
            const container = document.getElementById('scheduleContainer');
            const status = document.getElementById('status');

            try {
                const url = `https://raw.githubusercontent.com/${GITHUB_USERNAME}/${GITHUB_REPO}/main/schedule.json?t=${Date.now()}`;
                const response = await fetch(url, { cache: 'no-store' });
                if (!response.ok) throw new Error('数据不存在');

                const data = await response.json();

                // 更新页面标题
                if (data.title) {
                    document.querySelector('h1').textContent = `📅 ${data.title}`;
                }

                const matches = data.matches || data; // 兼容旧格式
                if (!matches || matches.length === 0) {
                    container.innerHTML = '<div class="empty-state">📭 暂无赛程数据</div>';
                    return;
                }

                // 按时间排序（最新的在前）
                matches.sort((a, b) => a.time.localeCompare(b.time));

                let html = '<div class="schedule-list">';
                matches.forEach(item => {
                    html += `
                <div class="schedule-item">
                    <span class="schedule-time">${item.time} ${item.weekday || ''}</span>
                    <span class="schedule-teams">
                        ${item.team_a} <span class="vs">vs</span> ${item.team_b}
                    </span>
                    <span class="schedule-meta">${item.stage || ''} ${item.location ? '· ' + item.location : ''}</span>
                </div>
            `;
                });
                html += '</div>';
                container.innerHTML = html;

                // 更新最后更新时间
                const lastModified = response.headers.get('last-modified');
                if (lastModified) {
                    const date = new Date(lastModified);
                    document.getElementById('lastUpdateText').textContent = `上次更新：${date.toLocaleString('zh-CN')}`;
                }

            } catch (error) {
                container.innerHTML = `<div class="empty-state">⚠️ 加载失败：${error.message}。请点击"更新赛程"按钮获取数据。</div>`;
            }
        }

        // 复制订阅链接
        function copyUrl() {
            const url = document.getElementById('subscribeUrl').textContent;
            navigator.clipboard.writeText(url).then(() => {
                alert('✅ 订阅链接已复制！');
            }).catch(() => {
                // 降级方案
                const range = document.createRange();
                range.selectNode(document.getElementById('subscribeUrl'));
                window.getSelection().removeAllRanges();
                window.getSelection().addRange(range);
                document.execCommand('copy');
                alert('✅ 订阅链接已复制！');
            });
        }

        // ===== 页面初始化 =====
        document.addEventListener('DOMContentLoaded', function () {
            // 设置订阅链接
            document.getElementById('subscribeUrl').textContent =
                `webcal://${GITHUB_USERNAME}.github.io/${GITHUB_REPO}/kpl.ics`;

            // 加载赛程
            loadSchedule();
        });
    </script>
</body>

</html>
